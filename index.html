<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="index.js" defer></script>
</head>
<body>

    <h1>Calculator</h1>
    <p><i>"You won't have a calculator in your pocket"</i></p>

    <div id="operation-display"></div>
    <div id="display"></div>

    <div id="numbers">
      <button id="num7" class="numbers">7</button>
      <button id="num8" class="numbers">8</button>
      <button id="num9" class="numbers">9</button>
      <button id="num4" class="numbers">4</button>
      <button id="num5" class="numbers">5</button>
      <button id="num6" class="numbers">6</button>
      <button id="num1" class="numbers">1</button>
      <button id="num2" class="numbers">2</button>
      <button id="num3" class="numbers">3</button>
      <button id="dot" class="numbers">.</button>
      <button id="num0" class="numbers">0</button>
      <button id="backspc" class="numbers">←</button>
    </div>
    
    <div id="operators">
      <button id="add" class="operators">+</button>
      <button id="subtract" class="operators">-</button>
      <button id="multiply" class="operators">×</button>
      <button id="divide" class="operators">÷</button>
    </div>

    <button id="evaluate" class="final-btns">=</button>
    <button id="clear" class="final-btns">clear</button>

</body>
<footer>
  <p>
    Copyright © 2026 Supremestrawhat
  </p>

    <img src="res/github.svg" alt="Source" class="github-img">
  </a>
</footer>
</html>

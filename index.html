<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="index.js" defer></script>
</head>
<body>

    <div id="display"></div>

    <div id="numbers">
      <button id="num0" class="keypad numbers">0</button>
      <button id="num1" class="keypad numbers">1</button>
      <button id="num2" class="keypad numbers">2</button>
      <button id="num3" class="keypad numbers">3</button>
      <button id="num4" class="keypad numbers">4</button>
      <button id="num5" class="keypad numbers">5</button>
      <button id="num6" class="keypad numbers">6</button>
      <button id="num7" class="keypad numbers">7</button>
      <button id="num8" class="keypad numbers">8</button>
      <button id="num9" class="keypad numbers">9</button>
    </div>
    
    <div id="operators">
      <button id="add" class="keypad operators">+</button>
      <button id="subtract" class="keypad operators">-</button>
      <button id="mutliply" class="keypad operators">×</button>
      <button id="divide" class="keypad operators">÷</button>
      <button id="evaluate" class="keypad operators">=</button>
    </div>

    <button id="clear">clear</button>

</body>
</html>
